name: Training Pipeline

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  training-pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test MLflow connection
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          python -c "
          import os, mlflow
          uri = os.environ['MLFLOW_TRACKING_URI']
          username = os.environ['MLFLOW_TRACKING_USERNAME']
          password = os.environ['MLFLOW_TRACKING_PASSWORD']
          os.environ['MLFLOW_TRACKING_USERNAME'] = username
          os.environ['MLFLOW_TRACKING_PASSWORD'] = password
          mlflow.set_tracking_uri(uri)
          print('URI:', uri)
          print('Username:', username)
          print('Password length:', len(password))
          print('Password first char:', repr(password[0]))
          print('Password last char:', repr(password[-1]))
          try:
              mlflow.set_experiment('test')
              print('SUCCESS')
          except Exception as e:
              print('FAILED:', e)
          "

      - name: Run training pipeline
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python src/training_pipeline.py